<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>초강력 증강 바둑 (Augmented Baduk)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: #222;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        canvas {
            border: 4px solid #444;
            background-color: #deb887;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .side-panel {
            width: 300px;
            background: #333;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .status-box {
            background: #444;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .log-box {
            background: #111;
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
            border-radius: 5px;
            color: #0f0;
        }

        /* 팝업 스타일 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #ffaa00;
            width: 500px;
        }

        .card-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .augment-card {
            flex: 1;
            background: #444;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .augment-card:hover {
            background: #555;
            border-color: #ffaa00;
            transform: translateY(-5px);
        }

        .augment-card h4 {
            margin: 0 0 10px 0;
            color: #ffaa00;
        }

        .augment-card p {
            font-size: 12px;
            margin: 0;
            color: #ccc;
        }
    </style>
</head>

<body>

    <h1>💥 증폭된 바람의 바둑 (Prototype) 💥</h1>

    <div class="container">
        <canvas id="board" width="600" height="600"></canvas>

        <div class="side-panel">
            <div class="status-box">
                <h3>내 진영: <span id="my-color" style="color:#ffaa00;">-</span></h3>
                <p>현재 차례: <span id="current-turn" style="font-weight:bold;">black</span></p>
            </div>
            <div class="status-box">
                <h4>📊 실시간 상태</h4>
                <div id="stats-display">흑: Lv.1 (0/10) <br> 백: Lv.1 (0/10)</div>
            </div>
            <h4>📜 전장 브리핑</h4>
            <div class="log-box" id="log-box">전투가 곧 시작됩니다...</div>
        </div>
    </div>

    <!-- 증강 선택 모달 팝업 -->
    <div class="modal" id="augment-modal">
        <div class="modal-content">
            <h3>✨ 레벨 업! 증강 능력을 선택하세요 ✨</h3>
            <p>보드판의 판도를 완전히 바꿀 사기 카드를 고르세요.</p>
            <div class="card-container" id="card-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');

        const size = 19;
        const padding = 30;
        const cellSize = (canvas.width - padding * 2) / (size - 1);

        let myColor = null;
        let turn = 'black';
        let boardState = Array.from(Array(size), () => Array(size).fill(null));

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#332211';
            ctx.lineWidth = 1;

            // 바둑판 그리드 선
            for (let i = 0; i < size; i++) {
                ctx.beginPath();
                ctx.moveTo(padding, padding + i * cellSize);
                ctx.lineTo(canvas.width - padding, padding + i * cellSize);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(padding + i * cellSize, padding);
                ctx.lineTo(padding + i * cellSize, canvas.height - padding);
                ctx.stroke();
            }

            // 화점(Star points) 그리기
            const starPoints = [3, 9, 15];
            starPoints.forEach(y => {
                starPoints.forEach(x => {
                    ctx.beginPath();
                    ctx.arc(padding + x * cellSize, padding + y * cellSize, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#332211';
                    ctx.fill();
                });
            });

            drawStones();
        }

        function drawStones() {
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (boardState[y][x]) {
                        ctx.beginPath();
                        ctx.arc(padding + x * cellSize, padding + y * cellSize, cellSize * 0.44, 0, Math.PI * 2);

                        // 바둑돌 입체감 그라데이션
                        let grd = ctx.createRadialGradient(
                            padding + x * cellSize - 3, padding + y * cellSize - 3, 1,
                            padding + x * cellSize, padding + y * cellSize, cellSize * 0.44
                        );

                        if (boardState[y][x] === 'black') {
                            grd.addColorStop(0, '#555');
                            grd.addColorStop(1, '#000');
                        } else {
                            grd.addColorStop(0, '#fff');
                            grd.addColorStop(1, '#ccc');
                        }

                        ctx.fillStyle = grd;
                        ctx.fill();
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        function appendLog(text) {
            const box = document.getElementById('log-box');
            box.innerHTML += `<br>${text}`;
            box.scrollTop = box.scrollHeight;
        }

        socket.on('init', (data) => {
            myColor = data.color;
            document.getElementById('my-color').innerText = myColor === 'spectator' ? '관전자' : myColor;
            drawBoard();
        });

        canvas.addEventListener('click', (e) => {
            if (myColor !== turn || myColor === 'spectator') return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left - padding;
            const mouseY = e.clientY - rect.top - padding;

            const x = Math.round(mouseX / cellSize);
            const y = Math.round(mouseY / cellSize);

            if (x >= 0 && x < size && y >= 0 && y < size && !boardState[y][x]) {
                socket.emit('place_stone', { x, y, color: myColor });
            }
        });

        socket.on('stone_placed', (data) => {
            boardState = data.boardState;
            turn = data.nextTurn;
            document.getElementById('current-turn').innerText = turn;

            // 전장 상황판 UI 업데이트
            document.getElementById('stats-display').innerHTML = `
                ⚫ 흑: Lv.${data.stats.black.level} (XP: ${data.stats.black.xp}/${data.stats.black.level * 10}) <br> 보유 증강: [${data.stats.black.augments.join(', ') || '없음'}]<br><br>
                ⚪ 백: Lv.${data.stats.white.level} (XP: ${data.stats.white.xp}/${data.stats.white.level * 10}) <br> 보유 증강: [${data.stats.white.augments.join(', ') || '없음'}]
            `;
            appendLog(data.log);
            drawBoard();
        });

        socket.on('level_up', (data) => {
            const modal = document.getElementById('augment-modal');
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            data.choices.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'augment-card';
                cardEl.innerHTML = `<h4>${card.name}</h4><p>${card.desc}</p>`;
                cardEl.onclick = () => {
                    socket.emit('select_augment', { color: myColor, augmentId: card.id });
                    modal.style.display = 'none';
                };
                container.appendChild(cardEl);
            });

            modal.style.display = 'flex';
        });

        socket.on('log_update', (msg) => {
            appendLog(msg);
        });
    </script>
</body>

</html>
